<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>S05-Overlay Dashboard</title>
<style>
  :root{--bg:#0d1117;--card:#161b22;--bd:#30363d;--tx:#e6edf3;--mut:#8b949e;
        --grn:#3fb950;--red:#f85149;--blu:#58a6ff;--amb:#d29922}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:16px;max-width:760px;margin:auto}
  h1{font-size:20px;margin-bottom:2px}
  .sub{color:var(--mut);font-size:13px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px}
  .regime{font-size:17px;font-weight:600}
  .up{color:var(--grn)} .down{color:var(--red)} .mut{color:var(--mut)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
  .stat{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px}
  .stat b{display:block;font-size:19px} .stat span{color:var(--mut);font-size:12px}
  .sec-title{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin:4px 0 8px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
  .row:last-child{border:0}
  .tk{font-weight:600} .meta{color:var(--mut);font-size:12px}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
  .pill.b{background:rgba(63,185,80,.15);color:var(--grn)}
  .pill.s{background:rgba(248,81,73,.15);color:var(--red)}
  .empty{color:var(--mut);text-align:center;padding:18px}
  .foot{color:var(--mut);font-size:11px;text-align:center;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
  <h1>📊 S05-Overlay</h1>
  <div class="sub" id="date">loading…</div>

  <div class="card">
    <div class="regime" id="regime">—</div>
    <div class="grid">
      <div class="stat"><b id="nifty">—</b><span>Nifty 50</span></div>
      <div class="stat"><b id="dma">—</b><span>200-DMA</span></div>
      <div class="stat"><b id="slots">—</b><span>Positions / Slots</span></div>
      <div class="stat"><b id="cash">—</b><span>Idle cash overlay</span></div>
    </div>
  </div>

  <div class="card">
    <div class="sec-title">🟢 Buy Today</div>
    <div id="buys"><div class="empty">—</div></div>
  </div>
  <div class="card">
    <div class="sec-title">🔴 Sell Today</div>
    <div id="sells"><div class="empty">—</div></div>
  </div>

  <div class="foot">
    Updates automatically each trading day via GitHub Actions.<br/>
    Signals only — execute orders yourself. Not investment advice.
  </div>

<script>
fetch('signals.json?_=' + Date.now())
  .then(r => r.json())
  .then(d => {
    document.getElementById('date').textContent = 'As of ' + d.date;
    const reg = document.getElementById('regime');
    reg.textContent = 'Market: ' + d.regime;
    reg.className = 'regime ' + (d.regime_up ? 'up' : 'down');
    document.getElementById('nifty').textContent = Number(d.nifty).toLocaleString('en-IN');
    document.getElementById('dma').textContent = Number(d.nifty_200dma).toLocaleString('en-IN');
    document.getElementById('slots').textContent = d.positions_held + ' / ' + (d.positions_held + d.free_slots);
    document.getElementById('cash').textContent = '₹' + Number(d.idle_cash).toLocaleString('en-IN');

    const buys = document.getElementById('buys');
    if (d.buys && d.buys.length) {
      buys.innerHTML = d.buys.map(b =>
        `<div class="row"><div><span class="tk">${b.symbol}</span>
         <span class="pill b">BUY ${b.shares}</span><br>
         <span class="meta">@ ₹${b.price} · stop ₹${b.stop} · mom ${b.momentum_6m}%</span></div>
         <div class="tk">₹${Number(b.value).toLocaleString('en-IN')}</div></div>`).join('');
    } else buys.innerHTML = '<div class="empty">No buys — '+(d.regime_up?'no qualifying setups':'regime defensive')+'</div>';

    const sells = document.getElementById('sells');
    if (d.sells && d.sells.length) {
      sells.innerHTML = d.sells.map(s =>
        `<div class="row"><div><span class="tk">${s.symbol}</span>
         <span class="pill s">SELL</span><br>
         <span class="meta">@ ₹${s.price} · P&L ${s.pnl_pct}% · ${s.reason}</span></div></div>`).join('');
    } else sells.innerHTML = '<div class="empty">No sells</div>';
  })
  .catch(e => { document.getElementById('date').textContent = 'No signals.json yet — run the workflow once.'; });
</script>
</body>
</html>
